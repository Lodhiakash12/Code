<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let arr = [1, 2, 3, 4];
        let sum = 0;
        let total = 0

        for (let i = 0; i < arr.length; i++) {
            sum = sum + arr[i];
        }

        for (let data of arr) {

            total = total + data
        }

        console.log(sum);
        console.log(total);


        //largest in array
        function largest(arr) {
            return Math.max(...arr);
        }
        console.log(largest([10, 50, 20]));


    </script>
</body>

</html>

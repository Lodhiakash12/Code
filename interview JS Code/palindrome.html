<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function palindrome(str){
            let rev=""
            
            for(let i=str.length-1;i>=0;i--){
                rev=rev+str[i]
            }

            if(str==rev){
                console.log("Palindrome")
            }   
            else{
                console.log("Not Palindrome ")
            }
        }

        palindrome("madam")
    </script>
</body>
</html>

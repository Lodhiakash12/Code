<body>
    <script>
        function fibonacci(n) {
            let a = 0, b = 1;
            console.log(a);
            console.log(b);
            for (let i = 2; i < n; i++) {
                let c = a + b;
                console.log(c);
                a = b;
                b = c;
            }
        }
        fibonacci(5);

    </script>
